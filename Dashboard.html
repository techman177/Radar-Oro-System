<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>INTEGRATCORE | RADAR DE ORO V1.5 PRO</title>
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --gold: #fcc200; --bg: #050608; --card: rgba(13, 17, 23, 0.95); 
            --success: #00ff88; --danger: #f85149; --text: #8b949e;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        
        body { 
            background-color: var(--bg); color: #ffffff; 
            font-family: 'Roboto', sans-serif; text-align: center; 
            padding: 10px; overflow-x: hidden;
            background: radial-gradient(circle at top right, #161b22, #050608);
        }

        .dashboard-container { 
            max-width: 440px; margin: 0 auto; border: 1px solid #30363d; 
            border-radius: 20px; background: var(--card); 
            padding: 20px; box-shadow: 0 10px 50px rgba(0, 0, 0, 0.9); position: relative; 
            backdrop-filter: blur(10px);
        }

        /* SEGURIDAD: BOTÓN SALIR */
        .btn-logout { 
            position: absolute; top: 18px; right: 18px; background: rgba(248, 81, 73, 0.1); 
            color: var(--danger); border: 1px solid var(--danger); padding: 6px 12px; 
            border-radius: 8px; font-size: 10px; cursor: pointer; 
            font-family: 'Orbitron'; font-weight: bold; transition: 0.3s; 
        }
        .btn-logout:hover { background: var(--danger); color: #fff; box-shadow: 0 0 15px var(--danger); }

        .header { font-family: 'Orbitron'; color: var(--gold); font-size: 1.2rem; letter-spacing: 3px; margin-top: 30px; text-shadow: 0 0 10px rgba(252, 194, 0, 0.3); }
        
        .status-badge { 
            display: inline-block; border: 1px solid var(--success); color: var(--success); 
            padding: 6px 18px; border-radius: 25px; font-size: 11px; font-weight: bold; 
            margin: 15px 0; background: rgba(0, 255, 136, 0.05); text-transform: uppercase;
            box-shadow: 0 0 10px rgba(0, 255, 136, 0.1);
        }

        /* PANEL DE MÉTRICAS */
        .stats-grid { display: flex; gap: 12px; margin-bottom: 25px; }
        .stat-box { background: rgba(255,255,255,0.03); border: 1px solid #30363d; border-radius: 12px; padding: 15px; flex: 1; transition: 0.3s; }
        .stat-title { font-size: 10px; color: var(--text); text-transform: uppercase; letter-spacing: 1px; }
        .stat-value { font-family: 'Orbitron'; font-size: 18px; color: var(--success); margin-top: 5px; }

        /* GRÁFICO PROFESIONAL */
        .chart-box { 
            height: 260px; margin-bottom: 25px; border: 1px solid #30363d; 
            border-radius: 15px; overflow: hidden; background: #000;
        }

        /* TERMINAL NEURAL */
        .ai-terminal { 
            background: #000; border: 1px solid #30363d; border-radius: 10px; 
            padding: 15px; text-align: left; font-family: 'Courier New', monospace; color: var(--success); 
            font-size: 11px; margin-bottom: 25px; height: 80px; overflow-y: auto; 
            border-left: 3px solid var(--gold);
        }

        /* HISTORIAL CON EFECTO NEÓN */
        .history-title { 
            font-family: 'Orbitron'; font-size: 11px; color: var(--gold); 
            margin-bottom: 15px; text-transform: uppercase; text-align: left;
            display: flex; align-items: center; gap: 10px;
        }
        .history-title::before { content: ""; width: 8px; height: 8px; background: var(--gold); border-radius: 50%; box-shadow: 0 0 12px var(--gold); }

        .history-box { 
            background: rgba(0,0,0,0.3); border: 1px solid #30363d; 
            border-radius: 12px; padding: 8px; margin-bottom: 25px; 
            max-height: 180px; overflow-y: auto; scrollbar-width: none;
        }

        .history-row { 
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(255,255,255,0.02); margin-bottom: 8px; padding: 14px;
            border-radius: 10px; border-right: 4px solid #30363d;
            animation: slideIn 0.5s ease-out;
        }

        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .history-symbol { font-family: 'Orbitron'; font-size: 12px; font-weight: bold; color: #fff; display: block; }
        .history-details { font-size: 10px; color: var(--text); margin-top: 3px; display: block; }

        .history-status { font-family: 'Orbitron'; font-size: 12px; font-weight: bold; padding: 5px 10px; border-radius: 6px; }

        .gain { color: var(--success); text-shadow: 0 0 12px var(--success); background: rgba(0, 255, 136, 0.1); border: 1px solid rgba(0, 255, 136, 0.2); }
        .loss { color: var(--danger); text-shadow: 0 0 12px var(--danger); background: rgba(248, 81, 73, 0.1); border: 1px solid rgba(248, 81, 73, 0.2); }

        /* PANEL DE CONTROL */
        .control-panel { background: rgba(255,255,255,0.02); padding: 15px; border-radius: 15px; border: 1px solid #30363d; margin-bottom: 25px; }
        .control-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; font-size: 13px; color: var(--text); }
        select, .lotes-input { background: #000; color: #fff; border: 1px solid #333; padding: 8px 12px; border-radius: 8px; font-family: 'Orbitron'; font-size: 14px; outline: none; }
        
        .btn-grid { display: flex; gap: 12px; margin-top: 10px; }
        .btn-buy { background: var(--success); color: #000; flex: 1; padding: 16px; border-radius: 10px; font-weight: bold; border: none; cursor: pointer; font-family: 'Orbitron'; transition: 0.2s; }
        .btn-sell { background: var(--danger); color: #fff; flex: 1; padding: 16px; border-radius: 10px; font-weight: bold; border: none; cursor: pointer; font-family: 'Orbitron'; transition: 0.2s; }
        .btn-buy:active, .btn-sell:active { transform: scale(0.95); opacity: 0.8; }

        /* VINCULACIÓN SUPABASE */
        .auth-section { border-top: 2px dashed #161b22; padding-top: 25px; margin-top: 10px; }
        .id-input { 
            width: 100%; padding: 16px; background: #000; border: 2px solid var(--gold); 
            color: #fff; border-radius: 10px; font-size: 16px; text-align: center; 
            margin-bottom: 15px; font-family: 'Orbitron';
        }
        .btn-gold { 
            background: var(--gold); color: #000; width: 100%; padding: 18px; 
            border: none; border-radius: 10px; font-weight: bold; cursor: pointer; 
            text-transform: uppercase; font-family: 'Orbitron'; font-size: 13px;
        }
        #mensaje { font-size: 13px; margin-bottom: 12px; min-height: 20px; font-weight: bold; letter-spacing: 1px; }
    </style>
</head>
<body>

    <div class="dashboard-container">
        <button class="btn-logout" onclick="cerrarSesion()">EXIT ⏻</button>

        <h2 class="header">MASTER RADAR V1.5</h2>
        <div class="status-badge">● TERMINAL ENCRIPTADA</div>

        <div class="stats-grid">
            <div class="stat-box">
                <div class="stat-title">BALANCE USD</div>
                <div class="stat-value">$5,477.38</div>
            </div>
            <div class="stat-box">
                <div class="stat-title">PNL DIARIO</div>
                <div class="stat-value">+$124.50</div>
            </div>
        </div>

        <div class="chart-box" id="tv_container"></div>

        <div class="ai-terminal" id="terminal-screen">
            > INICIANDO NÚCLEO INTEGRATCORE...<br>
            > VERIFICANDO CANAL SUPABASE... OK.<br>
            <span style="color: #fcc200;">> RADAR ACTIVO: ESCANEANDO XAUUSD</span>
        </div>

        <div class="history-title">📑 REGISTRO DE SEÑALES</div>
        <div class="history-box" id="history-list">
            <div class="history-row" style="border-right-color: #00ff88;">
                <div class="history-data">
                    <span class="history-symbol">BUY 0.10 | XAUUSD</span>
                    <span class="history-details">HACE 2 MIN • REF #9942</span>
                </div>
                <div class="history-status gain">+$45.20</div>
            </div>
        </div>

        <div class="control-panel">
            <div class="control-row">
                <span>ACTIVO:</span>
                <select id="activo_select" onchange="cambiarGrafico()">
                    <option value="OANDA:XAUUSD">ORO (XAUUSD)</option>
                    <option value="OANDA:EURUSD">EURUSD</option>
                    <option value="BITSTAMP:BTCUSD">BITCOIN (BTC)</option>
                </select>
            </div>
            <div class="control-row">
                <span>LOTES:</span>
                <input type="number" id="lotes_input" class="lotes-input" value="0.10" step="0.01">
            </div>
            <div class="btn-grid">
                <button class="btn-buy" onclick="ejecutarOrden('COMPRA')">COMPRA</button>
                <button class="btn-sell" onclick="ejecutarOrden('VENTA')">VENTA</button>
            </div>
        </div>

        <div class="auth-section">
            <input type="number" id="mt5_id" class="id-input" placeholder="ID CUENTA MT5">
            <p id="mensaje"></p>
            <button class="btn-gold" onclick="vincularMT5()">🔐 VINCULAR TERMINAL MT5</button>
        </div>
    </div>

    <script>
        // 🛡️ BLINDAJE DE ACCESO
        if (localStorage.getItem('acceso_concedido') !== 'true') {
            window.location.replace("index.html"); 
        }

        function cerrarSesion() {
            localStorage.removeItem('acceso_concedido');
            window.location.replace("index.html"); 
        }

        // GRÁFICO PROFESIONAL DINÁMICO
        function cargarGrafico(simbolo) {
            document.getElementById('tv_container').innerHTML = `<div id="tradingview_chart" style="height: 260px;"></div>`;
            new TradingView.widget({
                "autosize": true, "symbol": simbolo, "interval": "5", "timezone": "Etc/UTC",
                "theme": "dark", "style": "1", "locale": "es", "enable_publishing": false,
                "hide_top_toolbar": true, "backgroundColor": "#000000", "container_id": "tradingview_chart"
            });
        }
        cargarGrafico("OANDA:XAUUSD");

        function cambiarGrafico() {
            cargarGrafico(document.getElementById('activo_select').value);
        }

        // MOTOR DE ÓRDENES E HISTORIAL
        function ejecutarOrden(tipo) {
            const terminal = document.getElementById('terminal-screen');
            const historyList = document.getElementById('history-list');
            const activo = document.getElementById('activo_select').value.split(':')[1];
            const lotes = document.getElementById('lotes_input').value;
            const hora = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});

            terminal.innerHTML += `<br>> ENVIANDO ORDEN DE ${tipo}...`;
            terminal.scrollTop = terminal.scrollHeight;

            setTimeout(() => {
                terminal.innerHTML += `<br><span style="color: #fcc200;">> RESPUESTA SERVIDOR: ÉXITO ✅</span>`;
                
                const colorClase = tipo === 'COMPRA' ? 'gain' : 'loss';
                const borde = tipo === 'COMPRA' ? '#00ff88' : '#f85149';
                
                const nuevoRegistro = `
                    <div class="history-row" style="border-right-color: ${borde}">
                        <div class="history-data">
                            <span class="history-symbol">${tipo} ${lotes} | ${activo}</span>
                            <span class="history-details">${hora} • ID #88${Math.floor(Math.random()*99)}</span>
                        </div>
                        <div class="history-status ${colorClase}">
                            +$${(Math.random() * 70).toFixed(2)}
                        </div>
                    </div>`;
                historyList.insertAdjacentHTML('afterbegin', nuevoRegistro);
            }, 800);
        }

        // CONEXIÓN MAESTRA A SUPABASE
        async function vincularMT5() {
            const id = document.getElementById('mt5_id').value;
            const msg = document.getElementById('mensaje');
            
            if(!id) {
                msg.innerText = "⚠️ ERROR: ID REQUERIDO";
                msg.style.color = "#f85149";
                return;
            }

            msg.innerText = "SINCRONIZANDO CON LA NUBE...";
            msg.style.color = "#fcc200";

            const url = "https://gpoezpmciznhkwgsrcgo.supabase.co/rest/v1/Licencias";
            const apiKey = "sb_publishable_mOh12j1-IPGHglr__RrqRA_VrLym7U6";

            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: {
                        'apikey': apiKey,
                        'Authorization': `Bearer ${apiKey}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ numero_cuenta: id, estado: 'activo' })
                });

                if (response.ok) {
                    msg.innerText = "✅ TERMINAL VINCULADA CORRECTAMENTE";
                    msg.style.color = "#00ff88";
                    document.getElementById('mt5_id').value = "";
                } else {
                    const error = await response.json();
                    msg.innerText = "❌ ERROR NUBE: " + (error.message || "REINTENTE");
                    msg.style.color = "#f85149";
                }
            } catch (e) {
                msg.innerText = "❌ ERROR: FALLO DE CONEXIÓN";
                msg.style.color = "#f85149";
            }
        }
    </script>
</body>
</html>
