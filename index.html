<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RADAR DE ORO | ACCESO MAESTRO</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { 
            --gold: #fcc200; --bg: #050608; --card: #0d1117; 
            --success: #00ff88; --danger: #f85149; 
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body, html { width: 100%; min-height: 100%; background: var(--bg); font-family: 'Poppins', sans-serif; color: white; overflow-x: hidden; }
        
        .bg-overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.95)), 
            url('https://images.unsplash.com/photo-1611974717482-58359234b1b6?q=80&w=2000'); 
            background-size: cover; background-position: center; z-index: -1; 
        }

        .main-container { display: flex; justify-content: center; align-items: center; padding: 40px 20px; min-height: 100vh; }
        
        .glass-card { 
            background: rgba(13, 17, 23, 0.95); padding: 35px 25px; border-radius: 25px; 
            border: 2px solid var(--gold); width: 100%; max-width: 420px; 
            box-shadow: 0 0 40px rgba(252, 194, 0, 0.15); text-align: center; 
            backdrop-filter: blur(10px);
        }

        h1 { font-family: 'Orbitron'; font-size: 1.6rem; color: var(--gold); letter-spacing: 2px; margin-bottom: 5px; }
        .tagline { font-family: 'Orbitron'; font-size: 0.65rem; color: #8b949e; margin-bottom: 30px; display: block; letter-spacing: 1px; }

        .section-label { 
            font-family: 'Orbitron'; font-size: 0.6rem; color: var(--gold); 
            display: block; margin: 25px 0 10px; border-bottom: 1px solid #333; 
            padding-bottom: 5px; text-transform: uppercase;
        }

        .input-group { margin-bottom: 15px; }
        input { 
            width: 100%; padding: 15px; background: #000; border: 1px solid #333; 
            border-radius: 12px; color: white; font-family: 'Orbitron'; 
            font-size: 0.85rem; text-align: center; outline: none; transition: 0.3s; 
        }
        input:focus { border-color: var(--gold); box-shadow: 0 0 15px rgba(252,194,0,0.3); }

        .btn { 
            width: 100%; padding: 16px; border-radius: 12px; font-family: 'Orbitron'; 
            font-size: 0.75rem; font-weight: bold; cursor: pointer; border: none; 
            display: flex; align-items: center; justify-content: center; gap: 10px; 
            transition: 0.3s; margin-bottom: 12px; text-transform: uppercase;
        }
        .btn-main { background: var(--gold); color: #000; box-shadow: 0 4px 15px rgba(252, 194, 0, 0.2); }
        .btn-main:active { transform: scale(0.97); }
        
        .btn-outline { background: transparent; color: #fff; border: 1px solid #fff; }
        .btn-binance { background: #F3BA2F; color: #000; }

        .price-box { 
            background: rgba(255,255,255,0.03); padding: 15px; border-radius: 12px; 
            border: 1px dashed #444; margin: 20px 0; 
        }
        #priceTag { font-family: 'Orbitron'; font-size: 1.8rem; font-weight: bold; display: block; color: #fff; }
        #promoTxt { font-family: 'Orbitron'; font-size: 0.55rem; color: #8b949e; margin-top: 5px; }

        #status { font-family: 'Orbitron'; font-size: 0.65rem; margin-top: 15px; font-weight: bold; min-height: 15px; }
        .footer-note { font-size: 10px; color: #555; margin-top: 20px; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>

    <div class="bg-overlay"></div>

    <div class="main-container">
        <div class="glass-card">
            <h1>RADAR DE ORO</h1>
            <span class="tagline">INTEGRATCORE ENGINE V1.5</span>

            <span class="section-label">ACCESO AL SISTEMA</span>
            <div class="input-group">
                <input type="text" id="masterKey" placeholder="PEGAR LICENCIA AQUÍ">
            </div>
            <button class="btn btn-main" onclick="validarEntrada()">
                <i class="fas fa-bolt"></i> ACTIVAR TERMINAL
            </button>

            <span class="section-label">ADQUIRIR LICENCIA NUEVA</span>
            
            <button class="btn btn-outline" onclick="abrirExness()">
                <i class="fas fa-external-link-alt"></i> 1. REGISTRO EN EXNESS
            </button>
            
            <div class="input-group">
                <input type="text" id="exnessID" placeholder="TU ID DE SOCIO EXNESS" oninput="chequearDescuento()">
            </div>

            <div class="price-box">
                <span id="priceTag">$89.00</span>
                <div id="promoTxt">COSTO ANUAL USDT (BEP20)</div>
            </div>

            <button class="btn btn-binance" onclick="generarYPagos()">
                <i class="fab fa-bitcoin"></i> 2. PAGAR CON BINANCE
            </button>

            <div id="status"></div>
            
            <div class="footer-note">Seguridad de Acceso Activa</div>
        </div>
    </div>

    <script>
        const SALT = "GOLD_RADAR_2026_PRO";

        function abrirExness() {
            // Tu enlace de referido de Exness
            window.open('https://one.exnessonelink.com/a/3zrlq2qy7j?source=app', '_blank');
        }

        function chequearDescuento() {
            const id = document.getElementById('exnessID').value;
            const price = document.getElementById('priceTag');
            const promo = document.getElementById('promoTxt');
            
            if(id.length >= 5) {
                price.innerText = "$44.50";
                price.style.color = "#00ff88";
                promo.innerText = "¡CUPÓN DE SOCIO APLICADO (50% OFF)!";
                promo.style.color = "#00ff88";
            } else {
                price.innerText = "$89.00";
                price.style.color = "white";
                promo.innerText = "COSTO ANUAL USDT (BEP20)";
                promo.style.color = "#8b949e";
            }
        }

        function generarYPagos() {
            const partnerId = document.getElementById('exnessID').value;
            const status = document.getElementById('status');
            let linkBinance = "";
            let idParaClave = "";

            // DETECTOR DE PRECIO INTELIGENTE
            if(partnerId.length >= 5) {
                // TIENE DESCUENTO: Link de Binance de $44.50
                linkBinance = 'https://s.binance.com/4o8SyN8U';
                idParaClave = partnerId;
            } else {
                // NO TIENE DESCUENTO: Link de Binance de $89.00
                linkBinance = 'https://s.binance.com/64LsxwUb';
                idParaClave = "GUEST-" + Math.floor(Math.random() * 9999);
            }

            // Generar clave secreta
            const generatedKey = "XAU-" + btoa(idParaClave + SALT).substring(3, 13).toUpperCase();
            
            // Copiar al portapapeles y guardar temporalmente
            navigator.clipboard.writeText(generatedKey);
            document.getElementById('masterKey').value = generatedKey;
            localStorage.setItem("key_valida_actual", generatedKey);

            alert("¡LICENCIA GENERADA!\n\nSe ha copiado: " + generatedKey + "\n\nSerás redirigido a Binance con el monto exacto a pagar.\nAl terminar, vuelve aquí y presiona 'ACTIVAR TERMINAL'.");
            
            // Abrir la pasarela de pago exacta (44.50 o 89.00)
            window.open(linkBinance, '_blank');
            
            status.innerText = "ESPERANDO PAGO EN BINANCE...";
            status.style.color = "#fcc200";
        }

        function validarEntrada() {
            const typedKey = document.getElementById('masterKey').value;
            const validKey = localStorage.getItem("key_valida_actual");

            if (typedKey === "") {
                mostrarError("INGRESE UNA LICENCIA");
                return;
            }

            if (typedKey === validKey) {
                localStorage.setItem("acceso_concedido", "true");
                document.getElementById('status').innerText = "ACCESO CONCEDIDO. CARGANDO...";
                document.getElementById('status').style.color = "#00ff88";
                
                setTimeout(() => {
                    window.location.href = "dashboard.html";
                }, 1000);
            } else {
                mostrarError("LICENCIA INVÁLIDA O NO PAGADA");
            }
        }

        function mostrarError(txt) {
            const s = document.getElementById('status');
            s.innerText = "❌ " + txt;
            s.style.color = "#f85149";
            setTimeout(() => { s.innerText = ""; }, 3000);
        }
    </script>
</body>
</html>
