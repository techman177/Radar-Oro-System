<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RADAR DE ORO | ACCESO</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #fcc200; --bg: #050608; --success: #00ff88; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); font-family: 'Poppins', sans-serif; color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .glass-card { background: rgba(13, 17, 23, 0.95); padding: 30px; border-radius: 20px; border: 2px solid var(--gold); width: 100%; max-width: 400px; text-align: center; box-shadow: 0 0 30px rgba(252, 194, 0, 0.2); }
        h1 { font-family: 'Orbitron'; color: var(--gold); font-size: 1.5rem; margin-bottom: 20px; }
        .input-group { margin-bottom: 15px; }
        input { width: 100%; padding: 15px; background: #000; border: 1px solid #333; border-radius: 10px; color: white; font-family: 'Orbitron'; text-align: center; outline: none; }
        input:focus { border-color: var(--gold); }
        .btn { width: 100%; padding: 16px; border-radius: 10px; font-family: 'Orbitron'; font-weight: bold; cursor: pointer; border: none; transition: 0.3s; margin-bottom: 10px; text-transform: uppercase; }
        .btn-main { background: var(--gold); color: #000; }
        .btn-binance { background: #F3BA2F; color: #000; font-size: 0.7rem; }
        .price-box { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 10px; border: 1px dashed #444; margin: 20px 0; }
        #status { font-size: 12px; font-weight: bold; margin-top: 10px; min-height: 18px; }
    </style>
</head>
<body>
    <div class="glass-card">
        <h1>RADAR DE ORO</h1>
        <div class="input-group">
            <input type="text" id="masterKey" placeholder="PEGAR LICENCIA">
        </div>
        <button class="btn btn-main" onclick="validar()">ACTIVAR TERMINAL</button>
        
        <div class="price-box">
            <input type="text" id="exID" placeholder="ID SOCIO EXNESS" oninput="promo()" style="margin-bottom:10px">
            <span id="price" style="font-family:Orbitron; font-size:1.5rem">$89.00</span>
        </div>
        <button class="btn btn-binance" onclick="pagar()">PAGAR CON BINANCE</button>
        <div id="status"></div>
    </div>

    <script>
        function promo() {
            const val = document.getElementById('exID').value;
            document.getElementById('price').innerText = val.length >= 5 ? "$44.50" : "$89.00";
            document.getElementById('price').style.color = val.length >= 5 ? "#00ff88" : "white";
        }

        function pagar() {
            const id = document.getElementById('exID').value;
            if(id.length < 5) return alert("Ingresa tu ID de Socio");
            const key = "XAU-" + btoa(id + "GOLD").substring(0, 8).toUpperCase();
            localStorage.setItem("key_temp", key);
            document.getElementById('masterKey').value = key;
            navigator.clipboard.writeText(key);
            alert("Licencia copiada. Paga en Binance y luego presiona Activar.");
            window.open('https://www.binance.com/es/my/wallet/account/main/withdrawal/crypto/USDT', '_blank');
        }

        function validar() {
            const typed = document.getElementById('masterKey').value;
            const valid = localStorage.getItem("key_temp");
            if(typed && typed === valid) {
                localStorage.setItem("acceso_concedido", "true");
                window.location.href = "dashboard.html";
            } else {
                document.getElementById('status').innerText = "❌ LICENCIA INVÁLIDA";
                document.getElementById('status').style.color = "#ff4444";
            }
        }
    </script>
</body>
</html>
